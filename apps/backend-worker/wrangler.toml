name = "cloudpoints-backend"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[containers]]
class_name = "BackendContainer"
image = "../../Dockerfile"
max_instances = 3

[[durable_objects.bindings]]
name = "BACKEND"
class_name = "BackendContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BackendContainer"]


[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[vars]
LLM_PROVIDER = "anthropic"
APPLE_MUSIC_TOKEN_TTL_SECONDS = "3600"

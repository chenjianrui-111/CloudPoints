name = "cloudpoints-gateway"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[services]]
binding = "WEB"
service = "cloudpoints-web"

[[services]]
binding = "LANDING"
service = "cloudpoints-landing"

[[services]]
binding = "BACKEND"
service = "cloudpoints-backend"

[[services]]
binding = "ADMIN"
service = "cloudpoints-admin"

[[d1_databases]]
binding = "DB"
database_name = "cloudpoints-db"
database_id = "31cba35f-8e23-46eb-880f-19d667c0946b"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[vars]
APP_HOSTNAME = ""
ADMIN_HOSTNAME = ""
PREVIEW_DOMAIN = ""

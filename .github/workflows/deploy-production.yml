name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_SPOTIFY_REDIRECT_URI: https://app.${{ vars.PRODUCTION_DOMAIN }}/callback
        run: pnpm --filter web build

      - name: Build landing
        env:
          PUBLIC_APP_URL: https://app.${{ vars.PRODUCTION_DOMAIN }}
        run: pnpm --filter landing build

      - name: Deploy landing worker
        working-directory: apps/landing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.production.toml

      - name: Deploy admin worker
        working-directory: apps/admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Deploy web worker
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Deploy gateway worker
        working-directory: apps/gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy --config wrangler.production.toml \
            --route "app.${{ vars.PRODUCTION_DOMAIN }}/*" \
            --route "${{ vars.PRODUCTION_DOMAIN }}/*" \
            --route "admin.${{ vars.PRODUCTION_DOMAIN }}/*" \
            --var APP_HOSTNAME:app.${{ vars.PRODUCTION_DOMAIN }} \
            --var ADMIN_HOSTNAME:admin.${{ vars.PRODUCTION_DOMAIN }}

      - name: Deploy backend worker
        working-directory: apps/backend-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Sync gateway secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER="cloudpoints-gateway"
          DOMAIN="${{ vars.PRODUCTION_DOMAIN }}"
          declare -A SECRETS=(
            [BETTER_AUTH_SECRET]="${{ secrets.BETTER_AUTH_SECRET }}"
            [BETTER_AUTH_URL]="https://${DOMAIN}"
            [BETTER_AUTH_TRUSTED_ORIGINS]="https://${DOMAIN},https://app.${DOMAIN},https://preview.${DOMAIN},https://preview.app.${DOMAIN}"
            [APPLE_CLIENT_ID]="${{ secrets.APPLE_CLIENT_ID }}"
            [APPLE_KEY_ID]="${{ secrets.APPLE_KEY_ID }}"
            [APPLE_TEAM_ID]="${{ secrets.APPLE_TEAM_ID }}"
            [APPLE_PRIVATE_KEY]="${{ secrets.APPLE_PRIVATE_KEY }}"
            [GOOGLE_CLIENT_ID]="${{ secrets.GOOGLE_CLIENT_ID }}"
            [GOOGLE_CLIENT_SECRET]="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            [RESEND_API_KEY]="${{ secrets.RESEND_API_KEY }}"
          )
          for KEY in "${!SECRETS[@]}"; do
            VAL="${SECRETS[$KEY]}"
            if [ -n "$VAL" ]; then
              echo "$VAL" | npx wrangler secret put "$KEY" --name "$WORKER" 2>/dev/null
              echo "✓ $KEY"
            fi
          done

      - name: Sync secrets and variables to backend worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
        run: |
          WORKER="cloudpoints-backend"
          SKIP_KEYS='["GITHUB_TOKEN"]'
          for KEY in $(echo "$ALL_SECRETS" | jq -r --argjson skip "$SKIP_KEYS" 'keys[] | select(. as $k | $skip | index($k) | not)'); do
            VAL=$(echo "$ALL_SECRETS" | jq -r --arg k "$KEY" '.[$k]')
            if [ -z "$VAL" ]; then continue; fi
            echo "$VAL" | npx wrangler secret put "$KEY" --name "$WORKER" 2>/dev/null
            echo "✓ secret $KEY"
          done
          for KEY in $(echo "$ALL_VARS" | jq -r 'keys[]'); do
            VAL=$(echo "$ALL_VARS" | jq -r --arg k "$KEY" '.[$k]')
            if [ -z "$VAL" ]; then continue; fi
            echo "$VAL" | npx wrangler secret put "$KEY" --name "$WORKER" 2>/dev/null
            echo "✓ var $KEY"
          done

name: Deploy Preview

on:
  push:
    branches-ignore: [main]

jobs:
  deploy:
    name: Deploy to Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Derive branch slug
        id: branch
        run: |
          SLUG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_SPOTIFY_REDIRECT_URI: https://preview.app.${{ vars.PRODUCTION_DOMAIN }}/callback
        run: pnpm --filter web build

      - name: Build landing
        env:
          PUBLIC_APP_URL: https://preview.app.${{ vars.PRODUCTION_DOMAIN }}
        run: pnpm --filter landing build

      - name: Deploy landing worker
        working-directory: apps/landing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SLUG="${{ steps.branch.outputs.slug }}"
          DOMAIN="${{ vars.PRODUCTION_DOMAIN }}"
          cp wrangler.preview.toml wrangler.branch.toml
          cat >> wrangler.branch.toml <<TOML

          [[routes]]
          pattern = "landing-${SLUG}.pw.${DOMAIN}"
          custom_domain = true
          TOML
          npx wrangler deploy --config wrangler.branch.toml \
            --name "cloudpoints-landing-${SLUG}"

      - name: Deploy web worker
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SLUG="${{ steps.branch.outputs.slug }}"
          DOMAIN="${{ vars.PRODUCTION_DOMAIN }}"
          cp wrangler.preview.toml wrangler.branch.toml
          cat >> wrangler.branch.toml <<TOML

          [[routes]]
          pattern = "web-${SLUG}.pw.${DOMAIN}"
          custom_domain = true
          TOML
          npx wrangler deploy --config wrangler.branch.toml \
            --name "cloudpoints-web-${SLUG}"

      - name: Deploy preview gateway
        working-directory: apps/gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DOMAIN="${{ vars.PRODUCTION_DOMAIN }}"
          cp wrangler.preview.toml wrangler.branch.toml
          cat >> wrangler.branch.toml <<TOML

          [[routes]]
          pattern = "preview.${DOMAIN}"
          custom_domain = true

          [[routes]]
          pattern = "preview.app.${DOMAIN}"
          custom_domain = true

          [[routes]]
          pattern = "preview.admin.${DOMAIN}"
          custom_domain = true
          TOML
          npx wrangler deploy --config wrangler.branch.toml \
            --name "cloudpoints-gateway-preview" \
            --var APP_HOSTNAME:preview.app.${DOMAIN} \
            --var ADMIN_HOSTNAME:preview.admin.${DOMAIN} \
            --var PREVIEW_DOMAIN:pw.${DOMAIN}

      - name: Deploy backend worker
        working-directory: apps/backend-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SLUG="${{ steps.branch.outputs.slug }}"
          DOMAIN="${{ vars.PRODUCTION_DOMAIN }}"
          cp wrangler.toml wrangler.branch.toml
          sed -i "1s/^name = .*/name = \"cloudpoints-backend-${SLUG}\"/" wrangler.branch.toml
          cat >> wrangler.branch.toml <<TOML

          [[routes]]
          pattern = "backend-${SLUG}.pw.${DOMAIN}"
          custom_domain = true
          TOML
          npx wrangler deploy --config wrangler.branch.toml

      - name: Deploy admin worker
        working-directory: apps/admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SLUG="${{ steps.branch.outputs.slug }}"
          DOMAIN="${{ vars.PRODUCTION_DOMAIN }}"
          cp wrangler.toml wrangler.branch.toml
          cat >> wrangler.branch.toml <<TOML

          [[routes]]
          pattern = "admin-${SLUG}.pw.${DOMAIN}"
          custom_domain = true
          TOML
          npx wrangler deploy --config wrangler.branch.toml \
            --name "cloudpoints-admin-${SLUG}"

      - name: Sync gateway secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER="cloudpoints-gateway-preview"
          DOMAIN="${{ vars.PRODUCTION_DOMAIN }}"
          declare -A SECRETS=(
            [BETTER_AUTH_SECRET]="${{ secrets.BETTER_AUTH_SECRET }}"
            [BETTER_AUTH_URL]="https://preview.${DOMAIN}"
            [BETTER_AUTH_TRUSTED_ORIGINS]="https://preview.${DOMAIN},https://preview.app.${DOMAIN},http://localhost:5173"
            [APPLE_CLIENT_ID]="${{ secrets.APPLE_CLIENT_ID }}"
            [APPLE_KEY_ID]="${{ secrets.APPLE_KEY_ID }}"
            [APPLE_TEAM_ID]="${{ secrets.APPLE_TEAM_ID }}"
            [APPLE_PRIVATE_KEY]="${{ secrets.APPLE_PRIVATE_KEY }}"
            [GOOGLE_CLIENT_ID]="${{ secrets.GOOGLE_CLIENT_ID }}"
            [GOOGLE_CLIENT_SECRET]="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            [RESEND_API_KEY]="${{ secrets.RESEND_API_KEY }}"
          )
          for KEY in "${!SECRETS[@]}"; do
            VAL="${SECRETS[$KEY]}"
            if [ -n "$VAL" ]; then
              echo "$VAL" | npx wrangler secret put "$KEY" --name "$WORKER" 2>/dev/null
              echo "✓ $KEY"
            fi
          done

      - name: Sync secrets and variables to backend worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
        run: |
          WORKER="cloudpoints-backend-${{ steps.branch.outputs.slug }}"
          SKIP_KEYS='["GITHUB_TOKEN"]'
          for KEY in $(echo "$ALL_SECRETS" | jq -r --argjson skip "$SKIP_KEYS" 'keys[] | select(. as $k | $skip | index($k) | not)'); do
            VAL=$(echo "$ALL_SECRETS" | jq -r --arg k "$KEY" '.[$k]')
            if [ -z "$VAL" ]; then continue; fi
            echo "$VAL" | npx wrangler secret put "$KEY" --name "$WORKER" 2>/dev/null
            echo "✓ secret $KEY"
          done
          for KEY in $(echo "$ALL_VARS" | jq -r 'keys[]'); do
            VAL=$(echo "$ALL_VARS" | jq -r --arg k "$KEY" '.[$k]')
            if [ -z "$VAL" ]; then continue; fi
            echo "$VAL" | npx wrangler secret put "$KEY" --name "$WORKER" 2>/dev/null
            echo "✓ var $KEY"
          done
